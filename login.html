<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cadê Meu Rango? 🍽️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(145deg, #0d0d0d 0%, #1a1a1a 100%);
            border-radius: 20px;
            padding: 48px 40px;
            border: 1px solid rgba(46, 125, 50, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(46, 125, 50, 0.05);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(46, 125, 50, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-container::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(0, 150, 136, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .logo {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
            z-index: 1;
        }
        .logo h1 {
            font-size: 30px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .logo h1 span {
            color: #2E7D32;
        }
        .logo p {
            color: #888888;
            font-size: 14px;
            margin-top: 4px;
            font-weight: 400;
        }
        .divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #2E7D32, #00BFA5);
            border-radius: 4px;
            margin: 0 auto 32px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .form-group label {
            display: block;
            color: #b0b0b0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input::placeholder {
            color: #555555;
        }
        .form-group input:focus {
            border-color: #2E7D32;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(46, 125, 50, 0.08);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a472a 0%, #2E7D32 50%, #00BFA5 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(46, 125, 50, 0.2);
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(46, 125, 50, 0.35);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .links {
            text-align: center;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }
        .links a {
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
            margin: 0 8px;
        }
        .links a:hover {
            color: #2E7D32;
        }
        .links .separator {
            color: #333333;
            margin: 0 4px;
        }
        .erro {
            color: #e53935;
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            position: relative;
            z-index: 1;
        }
        .footer-text {
            text-align: center;
            margin-top: 28px;
            color: #444444;
            font-size: 11px;
            position: relative;
            z-index: 1;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .footer-text span {
            color: #2E7D32;
        }

        /* ===== RESPONSIVIDADE COMPLETA ===== */

        /* Tablets e celulares grandes */
        @media (max-width: 768px) {
            .login-container {
                padding: 36px 28px;
                max-width: 380px;
            }
            .logo h1 {
                font-size: 28px;
            }
        }

        /* Celulares médios */
        @media (max-width: 480px) {
            .login-container {
                padding: 28px 18px;
                border-radius: 16px;
                margin: 10px;
                max-width: 100%;
            }
            .logo h1 {
                font-size: 24px;
            }
            .logo p {
                font-size: 12px;
            }
            .logo {
                margin-bottom: 28px;
            }
            .form-group {
                margin-bottom: 16px;
            }
            .form-group label {
                font-size: 12px;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
                border-radius: 10px;
            }
            .btn-login {
                padding: 12px;
                font-size: 15px;
                border-radius: 10px;
            }
            .links a {
                font-size: 13px;
            }
            .divider {
                width: 40px;
                margin-bottom: 24px;
            }
            .footer-text {
                font-size: 10px;
                margin-top: 24px;
                padding-top: 16px;
            }
        }

        /* Celulares pequenos */
        @media (max-width: 360px) {
            .login-container {
                padding: 20px 14px;
                border-radius: 12px;
                margin: 6px;
            }
            .logo h1 {
                font-size: 20px;
            }
            .logo p {
                font-size: 10px;
            }
            .logo {
                margin-bottom: 20px;
            }
            .form-group {
                margin-bottom: 12px;
            }
            .form-group input {
                padding: 10px 12px;
                font-size: 13px;
            }
            .btn-login {
                padding: 10px;
                font-size: 14px;
            }
            .links {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-top: 18px;
            }
            .links .separator {
                display: none;
            }
            .links a {
                font-size: 12px;
            }
            .divider {
                width: 32px;
                margin-bottom: 18px;
            }
            .footer-text {
                font-size: 9px;
                margin-top: 18px;
                padding-top: 14px;
            }
        }

        /* Telas muito pequenas */
        @media (max-width: 280px) {
            .login-container {
                padding: 14px 10px;
                border-radius: 10px;
            }
            .logo h1 {
                font-size: 17px;
            }
            .logo p {
                font-size: 9px;
            }
            .form-group input {
                padding: 8px 10px;
                font-size: 12px;
            }
            .btn-login {
                padding: 8px;
                font-size: 12px;
            }
            .links a {
                font-size: 11px;
            }
        }

        /* Landscape (celular deitado) */
        @media (max-height: 500px) and (orientation: landscape) {
            .login-container {
                padding: 20px 24px;
                max-width: 380px;
            }
            .logo {
                margin-bottom: 16px;
            }
            .logo h1 {
                font-size: 22px;
            }
            .logo p {
                font-size: 11px;
            }
            .form-group {
                margin-bottom: 10px;
            }
            .form-group input {
                padding: 8px 12px;
                font-size: 13px;
            }
            .btn-login {
                padding: 10px;
                font-size: 14px;
            }
            .divider {
                width: 32px;
                margin-bottom: 16px;
            }
            .links {
                margin-top: 12px;
            }
            .footer-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🍽️ Cadê Meu <span>Rango</span>?</h1>
            <p>Controle de Auxílio Alimentação</p>
        </div>
        <div class="divider"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            <div class="erro" id="erroMsg">E-mail ou senha inválidos</div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="links">
            <a href="cadastro.html">Criar conta</a>
            <span class="separator">•</span>
            <a href="recuperar.html">Esqueci a senha</a>
        </div>

        <div class="footer-text">
            <span>🍽️ Cadê Meu Rango?</span> • Transformando a sua relação com a gestão do seu auxílio.
        </div>
    </div>

    <script type="module">
        import { login } from './js/auth.js';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const erroMsg = document.getElementById('erroMsg');
            
            erroMsg.style.display = 'none';
            
            try {
                await login(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = 'E-mail ou senha inválidos';
            }
        });
    </script>
</body>
</html>
