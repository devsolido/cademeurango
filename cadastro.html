<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Cadê Meu Rango? 🍽️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== VARIÁVEIS PADRONIZADAS ===== */
        :root {
            --primary: #22C55E;
            --primary-hover: #16A34A;
            --success: #22C55E;
            --danger: #EF4444;
            --info: #3B82F6;
            --warning: #F59E0B;
            --background: #0D0D0D;
            --card: #181818;
            --border: #2B2B2B;
            --text: #FFFFFF;
            --text-secondary: #A1A1AA;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --transition: all 0.3s ease;
            
            --space-4: 4px;
            --space-8: 8px;
            --space-16: 16px;
            --space-24: 24px;
            --space-32: 32px;
            --space-48: 48px;
            --space-64: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-24);
        }

        /* ===== CONTAINER ===== */
        .cadastro-container {
            max-width: 420px;
            width: 100%;
            background: var(--card);
            border-radius: var(--radius);
            padding: var(--space-48) var(--space-40);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .cadastro-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(34, 197, 94, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .cadastro-container::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(59, 130, 246, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ===== LOGO ===== */
        .logo {
            text-align: center;
            margin-bottom: var(--space-32);
            position: relative;
            z-index: 1;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo h1 span {
            color: var(--primary);
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: var(--space-4);
            font-weight: 400;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: var(--primary);
            border-radius: 4px;
            margin: 0 auto var(--space-32);
        }

        /* ===== FORMULÁRIO ===== */
        .form-group {
            margin-bottom: var(--space-20);
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: var(--space-8);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            outline: none;
        }

        .form-group input::placeholder {
            color: #555555;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.08);
        }

        /* ===== BOTÕES PADRONIZADOS ===== */
        .btn-primary {
            width: 100%;
            padding: 12px 24px;
            background: var(--primary);
            color: var(--text);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 48px;
            margin-top: var(--space-8);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* ===== LINKS ===== */
        .links {
            text-align: center;
            margin-top: var(--space-24);
            position: relative;
            z-index: 1;
        }

        .links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .links a:hover {
            color: var(--primary);
        }

        /* ===== MENSAGENS ===== */
        .erro {
            color: var(--danger);
            text-align: center;
            font-size: 14px;
            margin-top: var(--space-12);
            display: none;
            position: relative;
            z-index: 1;
        }

        .sucesso {
            color: var(--success);
            text-align: center;
            font-size: 14px;
            margin-top: var(--space-12);
            display: none;
            position: relative;
            z-index: 1;
        }

        /* ===== RODAPÉ ===== */
        .footer-text {
            text-align: center;
            margin-top: var(--space-32);
            color: #444444;
            font-size: 12px;
            position: relative;
            z-index: 1;
            padding-top: var(--space-20);
            border-top: 1px solid var(--border);
        }

        .footer-text span {
            color: var(--primary);
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 768px) {
            .cadastro-container {
                padding: var(--space-32) var(--space-24);
                max-width: 380px;
            }
            .logo h1 {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .cadastro-container {
                padding: var(--space-24) var(--space-16);
                border-radius: var(--radius-sm);
                margin: var(--space-8);
                max-width: 100%;
            }
            .logo h1 {
                font-size: 24px;
            }
            .logo p {
                font-size: 12px;
            }
            .logo {
                margin-bottom: var(--space-24);
            }
            .form-group {
                margin-bottom: var(--space-16);
            }
            .form-group label {
                font-size: 12px;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
            }
            .btn-primary {
                padding: 10px 20px;
                font-size: 15px;
                height: 44px;
            }
            .links a {
                font-size: 13px;
            }
            .divider {
                width: 40px;
                margin-bottom: var(--space-24);
            }
            .footer-text {
                font-size: 10px;
                margin-top: var(--space-24);
                padding-top: var(--space-16);
            }
        }

        @media (max-width: 360px) {
            .cadastro-container {
                padding: var(--space-16) var(--space-12);
                border-radius: var(--radius-sm);
                margin: var(--space-4);
            }
            .logo h1 {
                font-size: 20px;
            }
            .logo p {
                font-size: 10px;
            }
            .logo {
                margin-bottom: var(--space-16);
            }
            .form-group {
                margin-bottom: var(--space-12);
            }
            .form-group input {
                padding: 10px 12px;
                font-size: 13px;
            }
            .btn-primary {
                padding: 8px 16px;
                font-size: 14px;
                height: 40px;
            }
            .links a {
                font-size: 12px;
            }
            .divider {
                width: 32px;
                margin-bottom: var(--space-16);
            }
            .footer-text {
                font-size: 9px;
                margin-top: var(--space-16);
                padding-top: var(--space-12);
            }
        }

        @media (max-width: 280px) {
            .cadastro-container {
                padding: var(--space-12) var(--space-8);
            }
            .logo h1 {
                font-size: 17px;
            }
            .logo p {
                font-size: 9px;
            }
            .form-group input {
                padding: 8px 10px;
                font-size: 12px;
            }
            .btn-primary {
                padding: 6px 12px;
                font-size: 12px;
                height: 36px;
            }
            .links a {
                font-size: 11px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .cadastro-container {
                padding: var(--space-16) var(--space-24);
                max-width: 380px;
            }
            .logo {
                margin-bottom: var(--space-16);
            }
            .logo h1 {
                font-size: 22px;
            }
            .logo p {
                font-size: 11px;
            }
            .form-group {
                margin-bottom: var(--space-8);
            }
            .form-group input {
                padding: 8px 12px;
                font-size: 13px;
            }
            .btn-primary {
                padding: 8px 16px;
                font-size: 14px;
                height: 38px;
            }
            .divider {
                width: 32px;
                margin-bottom: var(--space-16);
            }
            .links {
                margin-top: var(--space-12);
            }
            .footer-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="cadastro-container">
        <!-- ===== LOGO ===== -->
        <div class="logo">
            <h1>🍽️ Cadê Meu <span>Rango</span>?</h1>
            <p>Crie sua conta</p>
        </div>
        <div class="divider"></div>

        <!-- ===== FORMULÁRIO ===== -->
        <form id="cadastroForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Matrícula IFPA</label>
                <input type="text" id="matricula" placeholder="Ex: 2024001" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Senha (mínimo 6 caracteres)</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
            </div>
            <div class="erro" id="erroMsg">Erro ao cadastrar</div>
            <div class="sucesso" id="sucessoMsg">Cadastro realizado com sucesso!</div>
            <button type="submit" class="btn-primary">Criar Conta</button>
        </form>

        <!-- ===== LINKS ===== -->
        <div class="links">
            <a href="login.html">Já tenho conta</a>
        </div>

        <!-- ===== RODAPÉ ===== -->
        <div class="footer-text">
            <span>🍽️ Cadê Meu Rango?</span> • IFPA Campus Marabá Industrial
        </div>
    </div>

    <script type="module">
        import { cadastrar } from './js/auth.js';
        
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const matricula = document.getElementById('matricula').value;
            const password = document.getElementById('password').value;
            const erroMsg = document.getElementById('erroMsg');
            const sucessoMsg = document.getElementById('sucessoMsg');
            
            erroMsg.style.display = 'none';
            sucessoMsg.style.display = 'none';
            
            try {
                await cadastrar(email, password, matricula);
                sucessoMsg.style.display = 'block';
                sucessoMsg.textContent = '✅ Cadastro realizado! Redirecionando...';
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (error) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = error.message || 'Erro ao cadastrar';
            }
        });
    </script>
</body>
</html>
