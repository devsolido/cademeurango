<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Auxílio - Cadê Meu Rango? 🍽️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22C55E;
            --primary-hover: #16A34A;
            --success: #22C55E;
            --danger: #EF4444;
            --info: #3B82F6;
            --warning: #F59E0B;
            --background: #0D0D0D;
            --card: #181818;
            --border: #2B2B2B;
            --text: #FFFFFF;
            --text-secondary: #A1A1AA;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --transition: all 0.3s ease;
            --space-4: 4px;
            --space-8: 8px;
            --space-16: 16px;
            --space-24: 24px;
            --space-32: 32px;
            --space-48: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--background); 
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-24);
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--card);
            border-radius: var(--radius);
            padding: var(--space-48) var(--space-32);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(34, 197, 94, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .container::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(59, 130, 246, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo {
            text-align: center;
            margin-bottom: var(--space-32);
            position: relative;
            z-index: 1;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo h1 span {
            color: var(--primary);
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: var(--space-4);
            font-weight: 400;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: var(--primary);
            border-radius: 4px;
            margin: 0 auto var(--space-32);
        }

        .form-group {
            margin-bottom: var(--space-16);
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: var(--space-4);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            outline: none;
        }

        .form-group select option {
            background: var(--card);
            color: var(--text);
        }

        .form-group input::placeholder {
            color: #555;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.08);
        }

        .btn-primary {
            width: 100%;
            padding: 12px 24px;
            background: var(--primary);
            color: var(--text);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 48px;
            margin-top: var(--space-8);
            position: relative;
            z-index: 1;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            width: 100%;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 40px;
            margin-top: var(--space-8);
            position: relative;
            z-index: 1;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .erro {
            color: var(--danger);
            text-align: center;
            font-size: 14px;
            margin-top: var(--space-12);
            display: none;
            position: relative;
            z-index: 1;
        }

        .sucesso {
            color: var(--success);
            text-align: center;
            font-size: 14px;
            margin-top: var(--space-12);
            display: none;
            position: relative;
            z-index: 1;
        }

        .footer-text {
            text-align: center;
            margin-top: var(--space-32);
            color: #444;
            font-size: 12px;
            position: relative;
            z-index: 1;
            padding-top: var(--space-20);
            border-top: 1px solid var(--border);
        }

        .footer-text span {
            color: var(--primary);
        }

        .info-box {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: var(--radius-sm);
            padding: var(--space-12) var(--space-16);
            margin-bottom: var(--space-16);
            position: relative;
            z-index: 1;
            display: none;
        }

        .info-box p {
            color: var(--text-secondary);
            font-size: 13px;
            margin: var(--space-4) 0;
            display: flex;
            align-items: center;
            gap: var(--space-8);
        }

        .info-box p strong {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .container {
                padding: var(--space-24) var(--space-16);
                border-radius: var(--radius-sm);
                margin: var(--space-8);
            }
            .logo h1 {
                font-size: 24px;
            }
            .logo p {
                font-size: 12px;
            }
            .btn-primary {
                padding: 10px 20px;
                font-size: 15px;
                height: 44px;
            }
            .btn-secondary {
                padding: 8px 20px;
                font-size: 13px;
                height: 36px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: var(--space-16) var(--space-12);
            }
            .logo h1 {
                font-size: 20px;
            }
            .form-group input,
            .form-group select {
                padding: 8px 12px;
                font-size: 13px;
            }
            .btn-primary {
                padding: 8px 16px;
                font-size: 14px;
                height: 40px;
            }
            .btn-secondary {
                padding: 6px 16px;
                font-size: 12px;
                height: 32px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: var(--space-16) var(--space-24);
                max-width: 400px;
            }
            .logo {
                margin-bottom: var(--space-16);
            }
            .logo h1 {
                font-size: 22px;
            }
            .logo p {
                font-size: 11px;
            }
            .form-group {
                margin-bottom: var(--space-8);
            }
            .form-group input,
            .form-group select {
                padding: 6px 10px;
                font-size: 13px;
            }
            .btn-primary {
                padding: 6px 16px;
                font-size: 14px;
                height: 34px;
            }
            .btn-secondary {
                padding: 4px 16px;
                font-size: 12px;
                height: 30px;
            }
            .footer-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🍽️ Cadê Meu <span>Rango</span>?</h1>
            <p>Cadastre seu auxílio</p>
        </div>
        <div class="divider"></div>

        <form id="auxilioForm">
            <!-- Nome do Auxílio -->
            <div class="form-group">
                <label>Nome do Auxílio</label>
                <input type="text" id="nome" placeholder="Ex: Auxílio Alimentação 2026" required>
            </div>

            <!-- Tipo de Auxílio -->
            <div class="form-group">
                <label>Tipo de Auxílio</label>
                <select id="tipoAuxilio" required>
                    <option value="">Selecione o tipo</option>
                    <option value="alimentacao">🍽️ Auxílio Alimentação (R$ 440,00 / 22 dias)</option>
                    <option value="outro">📌 Outro (personalizado)</option>
                </select>
            </div>

            <!-- Info box (mostra quando seleciona alimentação) -->
            <div class="info-box" id="infoBox">
                <p>📌 <strong>Valor padrão:</strong> R$ 440,00</p>
                <p>📅 <strong>Dias padrão:</strong> 22 dias</p>
                <p>💰 <strong>Média:</strong> R$ 20,00 por dia</p>
            </div>

            <!-- Valor -->
            <div class="form-group">
                <label>Valor Total (R$)</label>
                <input type="number" id="valor" step="0.01" required>
            </div>

            <!-- Dias -->
            <div class="form-group">
                <label>Dias Totais</label>
                <input type="number" id="dias" min="1" required>
            </div>

            <!-- Data de Início -->
            <div class="form-group">
                <label>Data de Início</label>
                <input type="date" id="dataInicio" required>
            </div>

            <div class="erro" id="erroMsg">Erro ao cadastrar</div>
            <div class="sucesso" id="sucessoMsg">✅ Auxílio cadastrado com sucesso!</div>

            <button type="submit" class="btn-primary">💾 Cadastrar Auxílio</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='dashboard.html'">← Voltar ao Dashboard</button>
        </form>

        <div class="footer-text">
            <span>🍽️ Cadê Meu Rango?</span> • IFPA Campus Marabá Industrial
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/config.js';
        import { getSessao } from './js/auth.js';
        import { logSistema } from './js/sync.js';

        // Data atual no input
        document.getElementById('dataInicio').value = new Date().toISOString().split('T')[0];

        const refreshChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('cademeurango-refresh') : null;

        window.atualizarSistemaCompleto = async function() {
            const refreshStamp = Date.now().toString();
            localStorage.setItem('cademeurango:data-refresh', refreshStamp);
            if (refreshChannel) {
                refreshChannel.postMessage({ type: 'refresh', stamp: refreshStamp });
            }
            logSistema('refresh-cadastro-auxilio', { stamp: refreshStamp });
        };

        window.forceReloadData = window.atualizarSistemaCompleto;

        window.addEventListener('storage', (event) => {
            if (event.key === 'cademeurango:data-refresh' && event.newValue) {
                if (window.location.pathname.includes('dashboard.html')) {
                    window.location.reload();
                }
            }
        });

        // ===== LÓGICA DO TIPO DE AUXÍLIO =====
        const tipoSelect = document.getElementById('tipoAuxilio');
        const valorInput = document.getElementById('valor');
        const diasInput = document.getElementById('dias');
        const infoBox = document.getElementById('infoBox');
        const nomeInput = document.getElementById('nome');

        tipoSelect.addEventListener('change', function() {
            if (this.value === 'alimentacao') {
                valorInput.value = '440';
                diasInput.value = '22';
                infoBox.style.display = 'block';
                if (!nomeInput.value) {
                    nomeInput.value = 'Auxílio Alimentação 2026';
                }
            } else if (this.value === 'outro') {
                valorInput.value = '';
                diasInput.value = '';
                infoBox.style.display = 'none';
                if (nomeInput.value === 'Auxílio Alimentação 2026') {
                    nomeInput.value = '';
                }
            } else {
                valorInput.value = '';
                diasInput.value = '';
                infoBox.style.display = 'none';
            }
        });

        // ===== SUBMIT =====
        document.getElementById('auxilioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const dataInicio = document.getElementById('dataInicio').value;
            const dias = parseInt(document.getElementById('dias').value);
            const erroMsg = document.getElementById('erroMsg');
            const sucessoMsg = document.getElementById('sucessoMsg');
            
            erroMsg.style.display = 'none';
            sucessoMsg.style.display = 'none';

            if (!nome) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = 'Por favor, informe o nome do auxílio';
                return;
            }

            try {
                const sessao = await getSessao();
                if (!sessao) { window.location.href = 'login.html'; return; }

                const { data: auxData, error: auxError } = await supabase.from('auxilios')
                    .insert({
                        user_id: sessao.user.id,
                        periodo: nome,
                        valor: valor,
                        data_inicio: dataInicio,
                        dias_totais: dias,
                        saldo_inicial: valor
                    })
                    .select();

                if (auxError) throw auxError;

                // criar mês correspondente à data de início automaticamente
                try {
                    const inserted = (auxData && auxData[0]) ? auxData[0] : null;
                    if (inserted) {
                        const d = new Date(dataInicio);
                        const mesesArray = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
                        const nomeMes = `${mesesArray[d.getMonth()]}/${d.getFullYear()}`;
                        await supabase.from('meses').insert({
                            user_id: sessao.user.id,
                            auxilio_id: inserted.id,
                            nome: nomeMes,
                            valor_mensal: valor,
                            dias_mes: dias,
                            saldo_inicial_mes: valor,
                            data_inicio: dataInicio,
                            ativo: true
                        });
                    }
                } catch (err) {
                    console.warn('Falha ao criar mês inicial automaticamente:', err.message || err);
                }

                sucessoMsg.style.display = 'block';
                sucessoMsg.textContent = '✅ Auxílio cadastrado! Redirecionando...';
                if (window.atualizarSistemaCompleto) {
                    await window.atualizarSistemaCompleto();
                }
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = error.message || 'Erro ao cadastrar';
                console.error('Erro:', error);
            }
        });
    </script>
</body>
</html>
