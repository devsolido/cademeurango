<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Auxílio - Cadê Meu Rango? 🍽️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 2rem; color: #2E7D32; }
        .logo p { color: #666; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; color: #333; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #2E7D32; }
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover { background: #1B5E20; }
        .btn-secondary {
            width: 100%;
            padding: 0.8rem;
            background: #666;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-secondary:hover { background: #444; }
        .info-box {
            background: #e8f5e9;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #2E7D32;
        }
        .info-box p { color: #1B5E20; font-size: 0.95rem; }
        .erro { color: #F44336; text-align: center; margin-top: 0.5rem; display: none; }
        .sucesso { color: #4CAF50; text-align: center; margin-top: 0.5rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🍽️ Cadê Meu Rango?</h1>
            <p>Cadastre seu auxílio alimentação</p>
        </div>

        <div class="info-box">
            <p>📌 <strong>Valor padrão:</strong> R$ 440,00<br>
            📅 <strong>Dias padrão:</strong> 22 dias<br>
            💰 <strong>Média:</strong> R$ 20,00 por dia</p>
        </div>

        <form id="auxilioForm">
            <div class="form-group">
                <label>Valor do Auxílio (R$)</label>
                <input type="number" id="valor" value="440" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Período</label>
                <input type="text" id="periodo" placeholder="Ex: Agosto/2026" required>
            </div>
            <div class="form-group">
                <label>Data de Início</label>
                <input type="date" id="dataInicio" required>
            </div>
            <div class="form-group">
                <label>Quantidade de Dias</label>
                <input type="number" id="dias" value="22" min="1" required>
            </div>
            <div class="erro" id="erroMsg">Erro ao cadastrar auxílio</div>
            <div class="sucesso" id="sucessoMsg">Auxílio cadastrado com sucesso!</div>
            <button type="submit" class="btn-primary">💾 Cadastrar Auxílio</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='dashboard.html'">← Voltar ao Dashboard</button>
        </form>
    </div>

    <script type="module">
        import { supabase } from './js/config.js';
        import { getSessao } from './js/auth.js';

        // Data atual no input
        document.getElementById('dataInicio').value = new Date().toISOString().split('T')[0];

        document.getElementById('auxilioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const valor = parseFloat(document.getElementById('valor').value);
            const periodo = document.getElementById('periodo').value;
            const dataInicio = document.getElementById('dataInicio').value;
            const dias = parseInt(document.getElementById('dias').value);
            const erroMsg = document.getElementById('erroMsg');
            const sucessoMsg = document.getElementById('sucessoMsg');
            
            erroMsg.style.display = 'none';
            sucessoMsg.style.display = 'none';

            try {
                const sessao = await getSessao();
                if (!sessao) { window.location.href = 'login.html'; return; }

                const { data, error } = await supabase.from('auxilios').insert({
                    user_id: sessao.user.id,
                    valor: valor,
                    periodo: periodo,
                    data_inicio: dataInicio,
                    dias_totais: dias,
                    saldo_inicial: valor
                });

                if (error) throw error;

                sucessoMsg.style.display = 'block';
                sucessoMsg.textContent = '✅ Auxílio cadastrado! Redirecionando...';
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = error.message || 'Erro ao cadastrar auxílio';
            }
        });
    </script>
</body>
</html>
