<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Auxílios - Cadê Meu Rango? 🍽️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #22C55E;
            --primary-hover: #16A34A;
            --success: #22C55E;
            --danger: #EF4444;
            --info: #3B82F6;
            --warning: #F59E0B;
            --background: #0D0D0D;
            --card: #181818;
            --border: #2B2B2B;
            --text: #FFFFFF;
            --text-secondary: #A1A1AA;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --transition: all 0.3s ease;
            --space-4: 4px;
            --space-8: 8px;
            --space-16: 16px;
            --space-24: 24px;
            --space-32: 32px;
            --space-48: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--background); 
            color: var(--text);
            min-height: 100vh;
        }
        
        .navbar {
            background: var(--card);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .navbar h1 { 
            font-size: 1.4rem; 
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .navbar h1 span { color: var(--primary); }

        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            padding: 6px 8px;
            background: rgba(255,255,255,0.04);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .menu-toggle:hover { background: rgba(255,255,255,0.08); }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 2.5px;
            background: var(--text);
            border-radius: 2px;
            transition: var(--transition);
        }
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .nav-links {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            transition: var(--transition);
        }
        .nav-links a { 
            color: var(--text-secondary); 
            text-decoration: none; 
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .nav-links a:hover { 
            background: rgba(255,255,255,0.06); 
            color: var(--text);
        }
        .nav-links a.active {
            background: rgba(34, 197, 94, 0.2);
            color: var(--primary);
        }
        .btn-pdf-calendario {
            background: var(--info);
            color: var(--text);
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: var(--transition);
        }
        .btn-pdf-calendario:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
        }
        .nav-links .btn-sair {
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 0.3rem 0.7rem;
        }
        .nav-links .btn-sair:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: var(--space-32); }
        
        .btn-primary {
            padding: 10px 24px;
            background: var(--primary);
            color: var(--text);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 44px;
            display: inline-flex;
            align-items: center;
            gap: var(--space-8);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-danger {
            padding: 6px 12px;
            background: var(--danger);
            color: var(--text);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 32px;
            display: inline-flex;
            align-items: center;
            gap: var(--space-4);
        }
        .btn-danger:hover {
            background: #DC2626;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 32px;
            display: inline-flex;
            align-items: center;
            gap: var(--space-4);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }

        .btn-success {
            padding: 6px 14px;
            background: var(--success);
            color: var(--text);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 32px;
            display: inline-flex;
            align-items: center;
            gap: var(--space-4);
        }
        .btn-success:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .btn-back {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            height: 40px;
            margin-bottom: var(--space-16);
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text);
            transform: translateX(-3px);
        }
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-32);
            flex-wrap: wrap;
            gap: var(--space-16);
        }
        .header-actions h2 { 
            font-size: 24px; 
            color: var(--text);
            font-weight: 700;
        }
        
        .lista-meses { display: grid; gap: var(--space-16); }
        
        .mes-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: var(--space-24);
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
        }
        .mes-card:hover { 
            transform: translateY(-2px); 
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        
        .mes-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-16);
        }
        
        .mes-info {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }
        .mes-info h3 { 
            color: var(--primary); 
            font-size: 18px;
            font-weight: 700;
        }
        .mes-info .mes-detalhes {
            display: flex;
            gap: var(--space-16);
            flex-wrap: wrap;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .mes-info .mes-detalhes span {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }
        .mes-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .mes-status.ativo { background: rgba(34, 197, 94, 0.2); color: var(--primary); }
        .mes-status.inativo { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .mes-actions {
            display: flex;
            gap: var(--space-8);
            flex-wrap: wrap;
            align-items: center;
        }
        
        .sem-meses {
            text-align: center;
            padding: var(--space-48);
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .sem-meses h2 { color: var(--text-secondary); margin-bottom: var(--space-8); }
        .sem-meses p { color: #555; margin-bottom: var(--space-16); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card);
            padding: var(--space-32);
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            animation: modalSlide 0.3s ease;
            box-shadow: var(--shadow);
        }
        @keyframes modalSlide {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h2 { 
            margin-bottom: var(--space-24);
            font-size: 20px;
            color: var(--text);
            font-weight: 700;
        }
        .modal-content .form-group { margin-bottom: var(--space-16); }
        .modal-content .form-group label { 
            display: block; 
            margin-bottom: var(--space-4); 
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .modal-content .form-group input,
        .modal-content .form-group select,
        .modal-content .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            outline: none;
        }
        .modal-content .form-group input:focus,
        .modal-content .form-group select:focus,
        .modal-content .form-group textarea:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.08);
        }
        .modal-content .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .close { 
            float: right; 
            font-size: 1.5rem; 
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .close:hover { color: var(--text); }
        .erro { color: var(--danger); text-align: center; margin-top: var(--space-8); display: none; font-weight: 500; }
        .sucesso { color: var(--success); text-align: center; margin-top: var(--space-8); display: none; font-weight: 500; }
        
        .detalhes-container {
            background: var(--card);
            border-radius: var(--radius);
            padding: var(--space-24);
            border: 1px solid var(--border);
        }
        .detalhes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-24);
            padding-bottom: var(--space-16);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: var(--space-16);
        }
        .detalhes-header h2 { 
            color: var(--primary); 
            font-size: 20px;
            font-weight: 700;
        }
        .detalhes-header .total { 
            font-size: 20px; 
            font-weight: 700; 
            color: var(--text);
        }
        .detalhes-header .actions { 
            display: flex; 
            gap: var(--space-8); 
            align-items: center; 
            flex-wrap: wrap; 
        }
        
        .resumo-detalhes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: var(--space-16);
            margin-bottom: var(--space-24);
        }
        .resumo-item {
            background: rgba(255,255,255,0.03);
            padding: var(--space-16);
            border-radius: var(--radius-sm);
            text-align: center;
            border: 1px solid var(--border);
        }
        .resumo-item .label { 
            font-size: 12px; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .resumo-item .value { 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--text); 
            margin-top: var(--space-4);
        }
        .resumo-item .value.danger { color: var(--danger); }
        .resumo-item .value.success { color: var(--success); }
        
        .gasto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-12) 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: var(--space-8);
        }
        .gasto-item:last-child { border-bottom: none; }
        .gasto-info { display: flex; flex-direction: column; }
        .gasto-info .data { font-size: 12px; color: var(--text-secondary); }
        .gasto-valor { 
            font-weight: 600; 
            color: var(--danger);
            font-size: 16px;
        }
        .gasto-actions { display: flex; gap: var(--space-8); align-items: center; flex-wrap: wrap; }
        .comprovante-link { font-size: 12px; }
        .comprovante-link a { color: var(--info); text-decoration: none; }
        .comprovante-link a:hover { text-decoration: underline; }
        
        .sem-gastos {
            text-align: center;
            padding: var(--space-32);
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .select-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-16);
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                padding: var(--space-16) 0;
                gap: var(--space-8);
                border-top: 1px solid var(--border);
                margin-top: var(--space-8);
                align-items: stretch;
            }
            .nav-links.open { display: flex; }
            .nav-links a {
                text-align: center;
                padding: var(--space-8);
                font-size: 14px;
                width: 100%;
            }
            .container { padding: var(--space-16); }
            .modal-content { margin: var(--space-16); padding: var(--space-24); max-width: 100%; }
            .resumo-detalhes { grid-template-columns: 1fr 1fr; }
            .select-group { grid-template-columns: 1fr; }
            .mes-content { flex-direction: column; align-items: stretch; }
            .mes-actions { justify-content: flex-start; }
            .detalhes-header { flex-direction: column; align-items: flex-start; }
            .navbar h1 { font-size: 1.2rem; }
            .header-actions h2 { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .navbar { padding: 0.6rem 1rem; }
            .menu-toggle span { width: 20px; height: 2px; }
            .mes-card { padding: var(--space-16); }
            .mes-info h3 { font-size: 16px; }
            .detalhes-container { padding: var(--space-16); }
            .resumo-detalhes { grid-template-columns: 1fr 1fr; gap: var(--space-8); }
            .resumo-item { padding: var(--space-8); }
            .resumo-item .value { font-size: 16px; }
            .btn-primary { padding: 8px 16px; font-size: 13px; height: 40px; }
            .modal-content { padding: var(--space-16); }
            .modal-content h2 { font-size: 18px; }
        }

        @media (max-width: 360px) {
            .navbar h1 { font-size: 1rem; }
            .menu-toggle span { width: 18px; height: 2px; }
            .mes-info .mes-detalhes { flex-direction: column; gap: var(--space-4); }
            .resumo-detalhes { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h1>🍽️ Cadê Meu <span>Rango</span>?</h1>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="dashboard.html">Dashboard</a>
            <a href="meus-auxilios.html" class="active">Meus Auxílios</a>
            <a href="/calendario-academico.pdf" target="_blank" class="btn-pdf-calendario">📅 Calendário</a>
            <a href="#" id="btnSair" class="btn-sair">Sair</a>
        </div>
    </nav>

    <div class="container">
        <div id="viewLista">
            <div class="header-actions">
                <h2>📋 Meus Auxílios</h2>
                <button class="btn-primary" id="btnNovoAuxilio">+ Novo Auxílio</button>
            </div>
            <div id="listaMeses" class="lista-meses"></div>
        </div>

        <div id="viewDetalhes" style="display:none;">
            <button class="btn-back" id="btnVoltar">← Voltar</button>
            <div class="detalhes-container" id="detalhesContainer"></div>
        </div>
    </div>

    <div class="modal" id="auxilioModal">
        <div class="modal-content">
            <span class="close" id="fecharModal">&times;</span>
            <h2 id="modalTitulo">📝 Cadastrar Auxílio</h2>
            <form id="auxilioForm">
                <input type="hidden" id="auxilioId">
                <div class="form-group">
                    <label>Período (Ex: Agosto/2026)</label>
                    <input type="text" id="periodo" placeholder="Ex: Agosto/2026" required>
                </div>
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="valor" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Data de Início</label>
                    <input type="date" id="dataInicio" required>
                </div>
                <div class="form-group">
                    <label>Dias Totais</label>
                    <input type="number" id="dias" value="22" min="1" required>
                </div>
                <div class="erro" id="erroMsg">Erro ao salvar</div>
                <div class="sucesso" id="sucessoMsg">Salvo com sucesso!</div>
                <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">💾 Salvar</button>
            </form>
        </div>
    </div>

    <div class="modal" id="mesModal">
        <div class="modal-content">
            <span class="close" id="fecharMesModal">&times;</span>
            <h2>📅 Iniciar Novo Mês</h2>
            <form id="mesForm">
                <input type="hidden" id="mesAuxilioId">
                <div class="form-group">
                    <label>Selecione o Mês e Ano</label>
                    <div class="select-group">
                        <select id="mesSelecionado" required>
                            <option value="">Mês</option>
                            <option value="Janeiro">Janeiro</option>
                            <option value="Fevereiro">Fevereiro</option>
                            <option value="Março">Março</option>
                            <option value="Abril">Abril</option>
                            <option value="Maio">Maio</option>
                            <option value="Junho">Junho</option>
                            <option value="Julho">Julho</option>
                            <option value="Agosto">Agosto</option>
                            <option value="Setembro">Setembro</option>
                            <option value="Outubro">Outubro</option>
                            <option value="Novembro">Novembro</option>
                            <option value="Dezembro">Dezembro</option>
                        </select>
                        <select id="anoSelecionado" required>
                            <option value="">Ano</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026" selected>2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Valor do Mês (R$)</label>
                    <input type="number" id="mesValor" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Dias do Mês</label>
                    <input type="number" id="mesDias" value="22" min="1" required>
                </div>
                <div class="form-group">
                    <label>Data de Início</label>
                    <input type="date" id="mesDataInicio" required>
                </div>
                <div class="erro" id="erroMes">Erro ao salvar</div>
                <div class="sucesso" id="sucessoMes">Salvo com sucesso!</div>
                <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">✅ Iniciar Mês</button>
            </form>
        </div>
    </div>

    <div class="modal" id="excluirMesModal">
        <div class="modal-content" id="excluirMesModalContent">
            <span class="close" id="fecharExcluirMesModal">&times;</span>
            <h2>🗑️ Excluir Mês</h2>
            <p style="color:var(--text-secondary); margin-bottom:var(--space-16);">Informe o motivo da exclusão:</p>
            <form id="excluirMesForm">
                <input type="hidden" id="excluirMesId">
                <div class="form-group">
                    <label>Justificativa *</label>
                    <textarea id="justificativaMes" placeholder="Ex: Mês criado por engano" required></textarea>
                </div>
                <div class="erro" id="erroExcluirMes">Erro ao excluir</div>
                <button type="submit" class="btn-danger" style="width:100%; padding:12px; font-size:14px; height:44px; justify-content:center;">Confirmar Exclusão</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/config.js';
        import { getSessao, logout } from './js/auth.js';

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('open');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                navLinks.classList.remove('open');
            });
        });

        let user = null;
        let auxilios = [];
        let meses = [];
        let gastos = [];

        function abrirModalAuxilio() {
            document.getElementById('modalTitulo').textContent = '📝 Cadastrar Auxílio';
            document.getElementById('auxilioId').value = '';
            document.getElementById('periodo').value = '';
            document.getElementById('valor').value = '440';
            document.getElementById('dataInicio').value = new Date().toISOString().split('T')[0];
            document.getElementById('dias').value = '22';
            document.getElementById('erroMsg').style.display = 'none';
            document.getElementById('sucessoMsg').style.display = 'none';
            document.getElementById('auxilioModal').style.display = 'flex';
        }

        async function carregarDados() {
            try {
                const sessao = await getSessao();
                if (!sessao) { window.location.href = 'login.html'; return; }
                user = sessao.user;

                const { data: auxData, error: auxError } = await supabase
                    .from('auxilios')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (auxError) throw auxError;
                auxilios = auxData || [];

                const { data: mesesData, error: mesesError } = await supabase
                    .from('meses')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (mesesError) throw mesesError;
                meses = mesesData || [];

                renderizarMeses();
            } catch (error) {
                console.error('Erro ao carregar:', error);
                alert('Erro ao carregar dados: ' + error.message);
            }
        }

        function renderizarMeses() {
            const container = document.getElementById('listaMeses');
            
            if (meses.length === 0) {
                container.innerHTML = `
                    <div class="sem-meses">
                        <h2>📭 Nenhum mês cadastrado</h2>
                        <p>Clique em "Novo Auxílio" para começar</p>
                        <button class="btn-primary" id="btnNovoAuxilioEmpty" style="margin:0 auto;">+ Novo Auxílio</button>
                    </div>
                `;
                document.getElementById('btnNovoAuxilioEmpty')?.addEventListener('click', abrirModalAuxilio);
                return;
            }

            container.innerHTML = meses.map(m => `
                <div class="mes-card" data-id="${m.id}">
                    <div class="mes-content">
                        <div class="mes-info">
                            <h3>📅 ${m.nome}</h3>
                            <div class="mes-detalhes">
                                <span>💰 R$ ${m.valor_mensal.toFixed(2)}</span>
                                <span>📆 ${m.dias_mes} dias</span>
                                <span>📅 Início: ${new Date(m.data_inicio).toLocaleDateString()}</span>
                                <span class="mes-status ${m.ativo ? 'ativo' : 'inativo'}">
                                    ${m.ativo ? '🟢 Ativo' : '🔴 Finalizado'}
                                </span>
                            </div>
                        </div>
                        <div class="mes-actions">
                            <button class="btn-danger" onclick="event.stopPropagation(); abrirExcluirMes('${m.id}')">🗑️ Excluir</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.mes-card').forEach(card => {
                card.addEventListener('click', () => verDetalhesMes(card.dataset.id));
            });
        }

        const excluirMesModal = document.getElementById('excluirMesModal');
        const excluirMesModalContent = document.getElementById('excluirMesModalContent');

        window.abrirExcluirMes = function(mesId) {
            document.getElementById('excluirMesId').value = mesId;
            document.getElementById('justificativaMes').value = '';
            document.getElementById('erroExcluirMes').style.display = 'none';
            excluirMesModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        document.getElementById('fecharExcluirMesModal').addEventListener('click', () => {
            excluirMesModal.style.display = 'none';
            document.body.style.overflow = '';
        });

        excluirMesModal.addEventListener('click', (e) => {
            if (e.target === excluirMesModal) {
                excluirMesModal.style.display = 'none';
                document.body.style.overflow = '';
            }
        });

        excluirMesModalContent.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && excluirMesModal.style.display === 'flex') {
                excluirMesModal.style.display = 'none';
                document.body.style.overflow = '';
            }
        });

        document.getElementById('excluirMesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const mesId = document.getElementById('excluirMesId').value;
            const justificativa = document.getElementById('justificativaMes').value.trim();
            const erroEl = document.getElementById('erroExcluirMes');
            
            if (!justificativa) {
                erroEl.style.display = 'block';
                erroEl.textContent = 'Por favor, informe uma justificativa';
                return;
            }

            try {
                const mes = meses.find(m => m.id === mesId);
                if (!mes) throw new Error('Mês não encontrado');

                await supabase.from('historico_exclusao_meses').insert({
                    user_id: user.id,
                    mes_id: mesId,
                    nome: mes.nome,
                    valor_mensal: mes.valor_mensal,
                    dias_mes: mes.dias_mes,
                    data_inicio: mes.data_inicio,
                    justificativa: justificativa
                });

                await supabase.from('gastos').delete().eq('mes_id', mesId);

                const { error } = await supabase
                    .from('meses')
                    .delete()
                    .eq('id', mesId)
                    .eq('user_id', user.id);

                if (error) throw error;

                excluirMesModal.style.display = 'none';
                document.body.style.overflow = '';
                
                // ===== RECARREGAR A PÁGINA FORÇADAMENTE =====
                window.location.reload();
                
            } catch (error) {
                erroEl.style.display = 'block';
                erroEl.textContent = error.message || 'Erro ao excluir mês';
                console.error('Erro detalhado:', error);
            }
        });

        async function verDetalhesMes(mesId) {
            const mes = meses.find(m => m.id === mesId);
            if (!mes) return;

            const { data: gastosData } = await supabase
                .from('gastos')
                .select('*')
                .eq('mes_id', mesId)
                .order('data_gasto', { ascending: false });

            gastos = gastosData || [];

            const totalGasto = gastos.reduce((s, g) => s + g.valor, 0);
            const saldo = mes.valor_mensal - totalGasto;

            document.getElementById('viewLista').style.display = 'none';
            document.getElementById('viewDetalhes').style.display = 'block';

            const container = document.getElementById('detalhesContainer');
            container.innerHTML = `
                <div class="detalhes-header">
                    <h2>📅 ${mes.nome}</h2>
                    <div class="actions">
                        <span class="total">R$ ${mes.valor_mensal.toFixed(2)}</span>
                    </div>
                </div>

                <div class="resumo-detalhes">
                    <div class="resumo-item">
                        <div class="label">💰 Saldo Atual</div>
                        <div class="value success">R$ ${saldo.toFixed(2)}</div>
                    </div>
                    <div class="resumo-item">
                        <div class="label">💸 Total Gasto</div>
                        <div class="value danger">R$ ${totalGasto.toFixed(2)}</div>
                    </div>
                    <div class="resumo-item">
                        <div class="label">📆 Dias</div>
                        <div class="value">${mes.dias_mes}</div>
                    </div>
                </div>

                <h3 style="margin-bottom:var(--space-16); color:var(--text-secondary); font-size:16px;">📋 Gastos do Mês</h3>
                <div id="listaGastosMes">
                    ${gastos.length === 0 ? 
                        '<div class="sem-gastos">🍽️ Nenhum gasto registrado neste mês</div>' :
                        gastos.map(g => `
                            <div class="gasto-item">
                                <div class="gasto-info">
                                    <span>${new Date(g.data_gasto).toLocaleDateString()} - ${g.local || 'Sem local'}</span>
                                    <span class="data">${g.observacao || ''} ${g.tipo_dia ? ' | ' + g.tipo_dia : ''}</span>
                                    ${g.comprovante ? `<span class="comprovante-link">📎 <a href="${g.comprovante}" target="_blank">Ver comprovante</a></span>` : ''}
                                </div>
                                <div class="gasto-actions">
                                    <span class="gasto-valor">R$ ${g.valor.toFixed(2)}</span>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>
            `;
        }

        document.getElementById('btnVoltar').addEventListener('click', () => {
            document.getElementById('viewDetalhes').style.display = 'none';
            document.getElementById('viewLista').style.display = 'block';
            carregarDados();
        });

        document.getElementById('btnSair').addEventListener('click', async () => {
            await logout();
            window.location.href = 'login.html';
        });

        document.getElementById('btnNovoAuxilio').addEventListener('click', abrirModalAuxilio);
        document.getElementById('fecharModal').addEventListener('click', () => document.getElementById('auxilioModal').style.display = 'none');
        document.getElementById('auxilioModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.style.display = 'none'; });

        document.getElementById('fecharMesModal').addEventListener('click', () => document.getElementById('mesModal').style.display = 'none');
        document.getElementById('mesModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.style.display = 'none'; });

        document.getElementById('auxilioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('auxilioId').value;
            const periodo = document.getElementById('periodo').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const dataInicio = document.getElementById('dataInicio').value;
            const dias = parseInt(document.getElementById('dias').value);
            const erroMsg = document.getElementById('erroMsg');
            const sucessoMsg = document.getElementById('sucessoMsg');
            
            erroMsg.style.display = 'none';
            sucessoMsg.style.display = 'none';

            try {
                if (id) {
                    const { error } = await supabase
                        .from('auxilios')
                        .update({ periodo, valor, data_inicio: dataInicio, dias_totais: dias })
                        .eq('id', id)
                        .eq('user_id', user.id);
                    if (error) throw error;
                    sucessoMsg.textContent = '✅ Auxílio atualizado!';
                } else {
                    const { error } = await supabase.from('auxilios').insert({
                        user_id: user.id,
                        periodo: periodo,
                        valor: valor,
                        data_inicio: dataInicio,
                        dias_totais: dias,
                        saldo_inicial: valor
                    });
                    if (error) throw error;
                    sucessoMsg.textContent = '✅ Auxílio cadastrado!';
                }

                sucessoMsg.style.display = 'block';
                setTimeout(() => {
                    document.getElementById('auxilioModal').style.display = 'none';
                    carregarDados();
                }, 1000);
            } catch (error) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = error.message || 'Erro ao salvar';
            }
        });

        document.getElementById('mesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const auxilioId = document.getElementById('mesAuxilioId').value;
            const mes = document.getElementById('mesSelecionado').value;
            const ano = document.getElementById('anoSelecionado').value;
            const nome = `${mes}/${ano}`;
            const valor = parseFloat(document.getElementById('mesValor').value);
            const dias = parseInt(document.getElementById('mesDias').value);
            const dataInicio = document.getElementById('mesDataInicio').value;
            const erroMsg = document.getElementById('erroMes');
            const sucessoMsg = document.getElementById('sucessoMes');
            
            erroMsg.style.display = 'none';
            sucessoMsg.style.display = 'none';

            if (!mes || !ano) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = 'Selecione o mês e o ano';
                return;
            }

            try {
                const { error } = await supabase.from('meses').insert({
                    user_id: user.id,
                    auxilio_id: auxilioId,
                    nome: nome,
                    valor_mensal: valor,
                    dias_mes: dias,
                    saldo_inicial_mes: valor,
                    data_inicio: dataInicio,
                    ativo: true
                });

                if (error) throw error;

                sucessoMsg.style.display = 'block';
                sucessoMsg.textContent = '✅ Mês iniciado!';
                setTimeout(() => {
                    document.getElementById('mesModal').style.display = 'none';
                    carregarDados();
                }, 1000);
            } catch (error) {
                erroMsg.style.display = 'block';
                erroMsg.textContent = error.message || 'Erro ao iniciar mês';
            }
        });

        carregarDados();
    </script>
</body>
</html>
